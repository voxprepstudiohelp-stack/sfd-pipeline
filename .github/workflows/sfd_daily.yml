name: SFD Daily Pipeline
on:
  schedule:
    - cron: '35 23 * * 0-4'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SFD_BASE_DIR: /tmp/sfd
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_LATEST_FOLDER_ID:     ${{ secrets.GDRIVE_LATEST_FOLDER_ID }}
      GDRIVE_HISTORY_FOLDER_ID:    ${{ secrets.GDRIVE_HISTORY_FOLDER_ID }}
      GDRIVE_INPUT_FOLDER_ID:      ${{ secrets.GDRIVE_INPUT_FOLDER_ID }}
      GDRIVE_CLIENT_ID:            ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET:        ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN:        ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      KIS_APP_KEY:                 ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET:              ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT_NO:              ${{ secrets.KIS_ACCOUNT_NO }}
      DART_API_KEY:                ${{ secrets.DART_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make dirs
        run: mkdir -p /tmp/sfd/outputs/latest /tmp/sfd/outputs/history /tmp/sfd/inputs /tmp/sfd/data

      - name: Copy static inputs
        run: |
          cp data/sfd_master_signal_input.csv /tmp/sfd/inputs/ || true
          cp data/sfd_naver_news_queries.csv /tmp/sfd/inputs/ || true
          cp data/sfd_company_master_v1.4_sector_filled.csv /tmp/sfd/data/ || true
          cp portfolio.json /tmp/sfd/ || true
          cp portfolio.json /tmp/sfd/data/ || true

      - name: Layer1 prev_close_fetch
        run: python tools/sfd_prev_close_fetch.py

      - name: Layer1.5 news_fetcher
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_NEWS_DISPLAY:  "20"
        run: python tools/sfd_news_fetcher.py
        continue-on-error: true

      - name: Layer2.7 technical_analyzer
        run: python tools/sfd_technical_analyzer.py
        continue-on-error: true

      - name: Layer2.8 oscillation_analyzer
        run: python tools/sfd_oscillation_analyzer.py
        continue-on-error: true

      - name: Layer2 signal_aggregator
        run: python tools/sfd_signal_aggregator.py

      - name: Layer2.5 rerating_watch
        run: python tools/sfd_rerating_watch.py
        continue-on-error: true

      - name: Layer2.6 fundamental_watch
        run: python tools/sfd_fundamental_watch.py
        continue-on-error: true

      - name: Layer2.6b sector_injector
        run: python tools/sfd_sector_injector.py
        continue-on-error: true

      - name: Layer3 backtest_d1
        run: python tools/sfd_backtest_d1.py

      - name: Layer4 finalize
        run: python tools/sfd_finalize.py
        continue-on-error: true

      - name: Layer5 portfolio_monitor
        run: python tools/sfd_portfolio_monitor.py
        continue-on-error: true

      - name: Upload latest to Drive
        run: |
          python - <<'PYEOF'
          import glob
          from utils.gdrive_uploader import upload_batch
          from config import LATEST_DIR, GDRIVE_LATEST_FOLDER_ID
          upload_batch([
              (f'{LATEST_DIR}/sfd_prev_close_latest.csv',          GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_news_signal_latest.csv',         GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_news_score_latest.csv',          GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_technical_latest.csv',           GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_oscillation_latest.csv',         GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_master_signal_latest.csv',       GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_rerating_watch_latest.csv',      GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_fundamental_latest.csv',         GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_sector_latest.csv',              GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_backtest_d1_latest.csv',         GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_final_signal_latest.csv',        GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_portfolio_monitor_latest.csv',   GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_prev_close_fetch.log',           GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_signal_aggregator.log',          GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_backtest_d1.log',                GDRIVE_LATEST_FOLDER_ID),
              (f'{LATEST_DIR}/sfd_news_fetcher.log',               GDRIVE_LATEST_FOLDER_ID),
          ])
          PYEOF

      - name: Upload history to Drive
        run: |
          python - <<'PYEOF'
          import glob
          from utils.gdrive_uploader import upload_batch
          from config import HISTORY_DIR, GDRIVE_HISTORY_FOLDER_ID
          files = glob.glob(f'{HISTORY_DIR}/**/*.csv', recursive=True)
          upload_batch([(f, GDRIVE_HISTORY_FOLDER_ID) for f in files])
          PYEOF


