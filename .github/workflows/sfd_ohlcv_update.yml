name: SFD OHLCV Update

on:
  schedule:
    # KST 18:00 = UTC 09:00 (weekdays) - after market close
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ohlcv:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update OHLCV Store
        timeout-minutes: 45
        run: python tools/sfd_ohlcv_store.py --update-universe

      - name: Commit OHLCV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ohlcv
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: OHLCV update $(date +%Y%m%d)"
          git push